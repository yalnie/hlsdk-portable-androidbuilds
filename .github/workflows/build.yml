name: Branch (updated)

on:
  push:
    branches:
      - '**'
      - '*.*'
      - '*_*'
  pull_request:
    branches:
      - '**'
      - '*.*'
      - '*_*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: 'x86'
            abi: 'x86'
            android_abi: 'x86'
          - name: 'armeabi-v7a (ARM32)'
            abi: 'armeabi-v7a'
            android_abi: 'armeabi-v7a'
          - name: 'arm64-v8a (ARM64)'
            abi: 'arm64-v8a'
            android_abi: 'arm64-v8a'
          - name: 'x86_64'
            abi: 'x86_64'
            android_abi: 'x86_64'

    name: Build Android - ${{ matrix.arch.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: r29
          link-to-sdk: true

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2.0.2
        with:
          cmake-version: '4.3.1'

      - name: Create build directory
        run: mkdir -p build-${{ matrix.arch.abi }}

      - name: Configure CMake for Android ${{ matrix.arch.name }}
        run: |
          cd build-${{ matrix.arch.abi }}
          cmake -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.arch.android_abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DPOLLY=ON \
            -DBUILD_CLIENT=ON \
            -DBUILD_SERVER=ON \
            ..

      - name: Build for Android ${{ matrix.arch.name }}
        run: |
          cd build-${{ matrix.arch.abi }}
          cmake --build . -j$(nproc)

      - name: List build artifacts
        if: success()
        run: |
          echo "Build artifacts for ${{ matrix.arch.name }}:"
          find build-${{ matrix.arch.abi }} -type f \( -name "*.so" -o -name "*.a" \) -exec ls -lh {} \;

      - name: Upload artifacts for ${{ matrix.arch.name }}
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch.abi }}-artifacts
          path: |
            build-${{ matrix.arch.abi }}/cl_dll/*.so
            build-${{ matrix.arch.abi }}/dlls/*.so
          retention-days: 30

      - name: Generate build summary
        if: always()
        run: |
          echo "## Build Summary for ${{ matrix.arch.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** ${{ matrix.arch.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**ABI:** ${{ matrix.arch.android_abi }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  build-summary:
    needs: build-android
    runs-on: ubuntu-latest
    if: always()
    name: Build Summary

    steps:
      - name: Create build summary
        run: |
          echo "# Android Multi-Architecture Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Overall Status:** ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Architectures Built" >> $GITHUB_STEP_SUMMARY
          echo "- x86" >> $GITHUB_STEP_SUMMARY
          echo "- x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- armeabi-v7a (ARM32)" >> $GITHUB_STEP_SUMMARY
          echo "- arm64-v8a (ARM64)" >> $GITHUB_STEP_SUMMARY

      - name: List all built artifacts
        if: success()
        run: |
          echo "## All Built Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find all-artifacts -type f -name "*.so" -o -name "*.a" | while read file; do
            echo "- \`$(basename $file)\` ($(du -h "$file" | cut -f1))" >> $GITHUB_STEP_SUMMARY
          done
